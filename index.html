<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Hat Certification Map</title>
  <link rel="icon" type="image/png" href="redhat-favicon.png">
  <script>(function(){var t=localStorage.getItem('redhat-cert-map-theme'),d;if(t==='dark')d=true;else if(t==='light')d=false;else d=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;if(d){document.documentElement.classList.add('pf-v6-theme-dark');document.documentElement.setAttribute('data-theme','dark');}else{document.documentElement.classList.remove('pf-v6-theme-dark');document.documentElement.setAttribute('data-theme','light');}})();</script>
  <link rel="stylesheet" href="https://unpkg.com/@patternfly/patternfly@6.4.0/patternfly.min.css">
  <link rel="stylesheet" href="https://unpkg.com/@patternfly/patternfly@6.4.0/patternfly-addons.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Mono:wght@400;600&family=Red+Hat+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      var KEY = "rh-cert-map-version";
      fetch("version.txt?t=" + Date.now())
        .then(function(r) { return r.text(); })
        .then(function(v) {
          var latest = v.trim();
          var cached = sessionStorage.getItem(KEY);
          if (cached && cached !== latest) {
            sessionStorage.setItem(KEY, latest);
            location.reload();
          } else {
            sessionStorage.setItem(KEY, latest);
          }
        })
        .catch(function() {});
    })();
  </script>
</head>
<body>
  <div class="pf-v6-c-page pf-m-sidebar-expanded">
    <!-- Masthead -->
    <header class="pf-v6-c-masthead">
      <div class="pf-v6-c-masthead__main">
        <span class="pf-v6-c-masthead__toggle">
          <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Toggle navigation" id="nav-toggle">
            <i class="fas fa-bars"></i>
          </button>
        </span>
        <a class="pf-v6-c-masthead__brand pf-v6-l-flex pf-m-align-items-center pf-m-gap-sm pf-v6-u-text-decoration-none" href="#">
          <img src="redhat-favicon.png" alt="Red Hat" class="masthead-logo" width="36" height="36">
          <div class="pf-v6-l-stack">
            <span class="pf-v6-c-title pf-m-md pf-v6-u-color-100">Certification</span>
            <span class="pf-v6-u-color-200 pf-v6-u-font-size-xs">Map</span>
          </div>
        </a>
      </div>
      <div class="pf-v6-c-masthead__content">
        <div class="pf-v6-l-flex pf-m-align-items-center pf-m-justify-content-flex-end pf-m-flex-1">
          <button class="pf-v6-c-button pf-m-plain" type="button" id="theme-toggle" aria-label="Toggle theme">
            <i class="fas fa-sun" id="theme-toggle-icon"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Sidebar -->
    <div class="pf-v6-c-page__sidebar pf-m-expanded" id="page-sidebar">
      <div class="pf-v6-c-page__sidebar-body">
        <!-- Certification ID section -->
        <div class="sidebar-verify-section">
          <div class="pf-v6-c-form__group">
            <label class="pf-v6-c-form__label" for="cert-id-input">
              <span class="pf-v6-c-form__label-text">Certification ID</span>
            </label>
            <div class="cert-verify-row">
              <input type="text" class="cert-input" id="cert-id-input" placeholder="###-###-###" autocomplete="off">
              <button class="pf-v6-c-button pf-m-primary pf-m-sm" id="verify-btn" type="button">Verify</button>
            </div>
            <p id="verify-status" class="cert-verify-status"></p>
            <p id="verify-owner" class="cert-verify-owner"></p>
            <p id="verify-source" class="cert-verify-source"></p>
          </div>
        </div>

        <!-- Exam navigation -->
        <nav class="pf-v6-c-nav" aria-label="Exam navigation">
          <div class="pf-v6-c-nav__section-title sidebar-exam-header">
            <span>Exams</span>
            <div class="sidebar-exam-actions">
              <button class="pf-v6-c-button pf-m-plain pf-m-sm cert-view-btn active" data-view="product" type="button" title="Group by product" aria-pressed="true"><i class="fas fa-layer-group"></i></button>
              <button class="pf-v6-c-button pf-m-plain pf-m-sm cert-view-btn" data-view="level" type="button" title="Group by level" aria-pressed="false"><i class="fas fa-signal"></i></button>
              <button class="pf-v6-c-button pf-m-plain pf-m-sm cert-view-btn" data-view="flat" type="button" title="Flat list" aria-pressed="false"><i class="fas fa-list"></i></button>
              <button class="pf-v6-c-button pf-m-plain pf-m-sm" id="sort-toggle" type="button" title="Sort order" aria-label="Sort ascending">A&#8594;Z</button>
            </div>
          </div>
          <div class="sidebar-search-row">
            <input type="text" class="cert-input" id="exam-search" placeholder="Search exams..." autocomplete="off" aria-label="Search exams">
            <button class="pf-v6-c-button pf-m-link pf-m-sm" id="clear-all" type="button">Clear All</button>
          </div>
          <div id="exam-list" class="sidebar-exam-list"></div>
        </nav>
      </div>
    </div>

    <!-- Sidebar Backdrop (mobile) -->
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <!-- Main Content Area -->
    <main class="pf-v6-c-page__main" id="main-content">
      <section class="pf-v6-c-page__main-section">
        <div class="pf-v6-c-title pf-m-lg pf-v6-u-mb-md">Certification Map</div>
        <div id="cert-map"></div>

        <!-- Old Credentials table -->
        <div id="old-credentials" class="other-certs" hidden>
          <h3>Active Legacy Credentials</h3>
          <table id="old-credentials-table">
            <thead>
              <tr>
                <th>Credential</th>
                <th>Date Obtained</th>
                <th>Valid Until</th>
                <th>Expires in</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <!-- Other Exams table -->
        <div id="other-exams" class="other-certs" hidden>
          <h3>Other Exams</h3>
          <table id="other-exams-table">
            <thead>
              <tr>
                <th>Code</th>
                <th>Certification</th>
                <th>Date Obtained</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- Tooltip -->
  <div id="tooltip" class="cert-tooltip" aria-hidden="true"></div>

  <footer class="site-footer">
    Vibe coded by <a href="https://github.com/w4hf" target="_blank" rel="noopener noreferrer">Hamza (w4hf)</a> - <a href="https://github.com/w4hf/rh-cert-map" target="_blank" rel="noopener noreferrer">Github Repo</a> - 2026
  </footer>

  <script src="app.js"></script>
</body>
</html>
